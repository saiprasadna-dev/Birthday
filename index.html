<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday 💗</title>
  <meta name="description" content="A little birthday surprise, made with love." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Particle + confetti canvas layers -->
  <canvas id="fx-canvas" aria-hidden="true"></canvas>
  <canvas id="confetti-canvas" aria-hidden="true"></canvas>

  <!-- Music toggle -->
  <button id="music-toggle" class="music-toggle" aria-label="Play background music" title="Play music">
    <svg class="icon-music" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      <path d="M9 18V5l12-2v13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="6" cy="18" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/>
      <circle cx="18" cy="16" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/>
    </svg>
    <svg class="icon-muted" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      <path d="M9 18V5l12-2v13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="6" cy="18" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/>
      <circle cx="18" cy="16" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/>
      <line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </button>
  <audio id="bg-music" loop preload="none"></audio>

  <!-- Back button + progress dots (hidden on the first page) -->
  <button class="nav-back" id="nav-back" aria-label="Go to the previous page" hidden>
    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <div class="progress" id="progress" hidden></div>

  <!-- ============ THE PAGES ============ -->
  <main id="deck" class="deck">

    <!-- PAGE 0 · INTRO GIFT -->
    <section class="screen is-active" id="screen-intro" data-name="intro">
      <div class="screen-inner">
        <div class="gift" id="gift" role="button" tabindex="0" aria-label="Open your gift">
          <div class="gift-lid"></div>
          <div class="gift-box"></div>
          <div class="gift-ribbon"></div>
          <div class="gift-bow"><span></span><span></span></div>
          <div class="gift-heart">♥</div>
        </div>
        <p class="intro-hint" id="intro-hint"></p>
        <button class="btn-candy intro-btn" id="intro-btn"></button>
      </div>
    </section>

    <!-- PAGE 1 · HERO -->
    <section class="screen" id="screen-hero" data-name="hero">
      <div class="screen-inner">
        <p class="eyebrow">✦ &nbsp;a day worth celebrating&nbsp; ✦</p>
        <h1 class="hero-title">
          <span class="hero-line1" id="hero-line1"></span>
          <span class="hero-name" id="hero-name"></span>
          <span class="hero-sparkle" aria-hidden="true">💖</span>
        </h1>
        <p class="hero-type"><span id="typewriter"></span><span class="caret" aria-hidden="true">|</span></p>

        <div class="cake" id="cake" role="button" tabindex="0" aria-label="Blow out the candles">
          <div class="cake-plate"></div>
          <div class="cake-base"></div>
          <div class="cake-icing"></div>
          <div class="candle"><span class="flame"></span></div>
          <div class="candle"><span class="flame"></span></div>
          <div class="candle"><span class="flame"></span></div>
        </div>
        <p class="cake-hint" id="cake-hint"></p>

        <button class="btn-gradient page-next" id="hero-next"></button>
      </div>
    </section>

    <!-- PAGE 2 · WISHES -->
    <section class="screen" id="screen-wishes" data-name="wishes">
      <div class="screen-inner">
        <p class="section-intro" id="wishes-intro"></p>
        <div class="wish-list" id="wish-list"></div>
        <div class="wish-controls">
          <button class="btn-candy" id="wish-reveal"></button>
          <button class="btn-gradient" id="wish-done" hidden></button>
        </div>
        <p class="wish-count" id="wish-count"></p>
      </div>
    </section>

    <!-- PAGE 3 · MEMORIES -->
    <section class="screen" id="screen-memories" data-name="memories">
      <div class="screen-inner wide">
        <h2 class="script-h" id="memories-title"></h2>
        <p class="section-intro" id="memories-intro"></p>
        <div class="memory-grid" id="memory-grid"></div>
        <button class="btn-gradient page-next" id="memories-next"></button>
      </div>
    </section>

    <!-- PAGE 4 · FINALE / THANK YOU -->
    <section class="screen" id="screen-finale" data-name="finale">
      <div class="screen-inner">
        <div class="finale-card">
          <h2 class="script-h" id="finale-title"></h2>
          <div class="finale-body" id="finale-body"></div>
          <p class="finale-close" id="finale-close"></p>
          <p class="finale-name" id="finale-name"></p>
          <button class="btn-gradient finale-btn" id="finale-btn"></button>
        </div>
      </div>
    </section>

    <!-- PAGE 5 · COUNTDOWN -->
    <section class="screen" id="screen-countdown" data-name="countdown">
      <div class="screen-inner">
        <h2 class="script-h" id="countdown-title"></h2>
        <div class="count-grid" id="count-grid"></div>
        <p class="count-sub" id="count-sub"></p>
        <button class="btn-candy replay-btn" id="replay-btn"></button>
        <p class="footer-text" id="footer-text"></p>
      </div>
    </section>

  </main>

  <!-- Lightbox for memories -->
  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕</button>
    <div class="lightbox-inner" id="lightbox-inner"></div>
  </div>

  <!-- Big wish overlay (from the cake) -->
  <div class="wish-overlay" id="wish-overlay" hidden>
    <p class="wish-text script-h" id="wish-text"></p>
  </div>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
